services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.v3
    container_name: linuxaio-v3-api
    ports:
      - "8787:8787"
    environment:
      - PORT=8787
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: linuxaio-v3-frontend
    ports:
      - "8000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.v3.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
